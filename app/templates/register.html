{% extends "base.html" %}

{% block body %}
<form method="POST">
    <h3 align="center"> Sign Up</h3>
    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" value="{{ email if email else '' }}" required>
    </div>
    <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Enter first name" value="{{ first_name if first_name else '' }}" required>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Create password" required>
    </div>
    <div class="form-group">
        <label for="confirmation">Confirm Password</label>
        <input type="password" class="form-control" id="confirmation" name="confirmation" placeholder="Confirm password" required>
    </div>
    <br>
    <button type="submit" class="btn btn-primary">Sign Up</button>
</form>

{% endblock %}
